<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIPO.IO</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="massBox">
      <div class="massLabel">Mass</div>
      <div class="massValue" id="massValue">0</div>
    </div>

    <div class="leaderboard">
      <div class="leaderboardTitle">Leaderboard</div>
      <div class="leaderboardEntries" id="leaderboardEntries"></div>
    </div>
  </div>

  <div class="chatBox" id="chatBox">
    <div class="chatMessages" id="chatMessages"></div>
    <input
      type="text"
      id="chatInput"
      class="chatInput"
      placeholder="Type message and press Enter..."
      maxlength="160"
    />
  </div>

  <div class="landingScreen" id="landingScreen">
    <div class="moneyBg" id="moneyBg"></div>

    <div class="landingPanel">
      <h1>PIPO.IO</h1>
      <p>Grow bigger. Dominate the map.</p>
      <button id="startMenuBtn">PLAY</button>
    </div>

    <div class="authPanel" id="authPanel" style="display:none;">
      <h2>Account</h2>
      <input id="authUsername" type="text" placeholder="Username" maxlength="20" />
      <input id="authPassword" type="password" placeholder="Password" maxlength="64" />

      <div class="authButtons">
        <button id="registerBtn" type="button">Register</button>
        <button id="loginBtn" type="button">Login</button>
        <button id="logoutBtn" type="button" style="display:none;">Logout</button>
      </div>

      <div id="authStatus"></div>
    </div>
  </div>

  <div class="menu" id="menu" style="display:none;">
    <div class="moneyBg" id="menuMoneyBg"></div>
    <div class="panel gameMenuPanel">
      <h1>PIPO.IO</h1>
      <p>Choose your name and ball color, then enter the arena.</p>

      <input
        id="nameInput"
        type="text"
        maxlength="16"
        placeholder="Nickname"
        value="Player"
      />

      <div class="colorRow">
        <label for="colorInput">Ball color</label>
        <input id="colorInput" type="color" value="#33c3ff" />
      </div>

      <div class="walletCard" id="walletCard">
        <div class="walletHeader">Wallet</div>

        <div class="walletBalanceRow">
          <span>Wallet</span>
          <strong id="walletValue">$0.00</strong>
        </div>

        <input
          id="walletAmountInput"
          type="number"
          min="0.01"
          step="0.01"
          placeholder="Amount in €"
        />

        <input
          id="withdrawAddressInput"
          type="text"
          maxlength="80"
          placeholder="Solana wallet address for withdrawals"
        />

        <div class="walletButtons">
          <button id="addBalanceBtn" type="button">Add Balance</button>
          <button id="withdrawBtn" type="button" class="secondaryButton">Withdraw</button>
        </div>

        <div class="walletHint">1 EUR = 1 wallet credit</div>
        <div class="walletStatus" id="walletStatus"></div>
      </div>

      <button id="playBtn">Enter Game</button>

      <div class="smallInfo">
        Move mouse to move · Space to split · W to eject mass · \ to chat
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/game.js"></script>
</body>
</html>
